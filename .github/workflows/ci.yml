name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Ruff check
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Bandit security scan
        run: uv run bandit -r localrag/ -ll

      - name: Mypy type check
        run: uv run mypy localrag/ --ignore-missing-imports --no-strict-optional

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run unit and integration tests
        run: uv run pytest -x -q --cov=localrag --cov-report=xml

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  docker-build:
    name: Docker build and health check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t localrag-api:ci .

      - name: Start container
        run: |
          docker run -d --name localrag-ci \
            -e OLLAMA_BASE_URL=http://localhost:11434 \
            -e CHROMA_PERSIST_PATH=/tmp/chroma \
            -p 8000:8000 \
            localrag-api:ci

      - name: Health check (with retry)
        run: |
          for i in $(seq 1 15); do
            status=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/health || echo "000")
            echo "Attempt $i — status: $status"
            if [ "$status" = "200" ]; then exit 0; fi
            sleep 2
          done
          docker logs localrag-ci
          exit 1

      - name: Stop container
        if: always()
        run: docker stop localrag-ci || true

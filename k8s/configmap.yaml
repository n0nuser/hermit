apiVersion: v1
kind: ConfigMap
metadata:
  name: localrag-api-config
  namespace: default
data:
  OLLAMA_BASE_URL: "http://ollama:11434"
  CHROMA_PERSIST_PATH: "/app/data/chroma"
  CHROMA_COLLECTION_NAME: "localrag"
  OLLAMA_EMBED_MODEL: "nomic-embed-text"
  OLLAMA_LLM_MODEL: "llama3.2"
  LLM_BACKEND: "ollama"
  RAG_TOP_K: "5"
  CHUNK_CHARS: "512"
  CHUNK_OVERLAP_CHARS: "50"
  LOG_LEVEL: "INFO"
  API_HOST: "0.0.0.0"
  API_PORT: "8000"

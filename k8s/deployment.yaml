apiVersion: apps/v1
kind: Deployment
metadata:
  name: hermit-api
  namespace: default
  labels:
    app: hermit-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hermit-api
  template:
    metadata:
      labels:
        app: hermit-api
    spec:
      containers:
        - name: hermit-api
          image: hermit-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: hermit-api-config
            - secretRef:
                name: hermit-api-secrets
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          volumeMounts:
            - name: data
              mountPath: /app/data
      volumes:
        - name: data
          emptyDir: {}

# Secret template — values are redacted.
# Replace <base64-encoded-value> with: echo -n "your-value" | base64
# Apply with: kubectl apply -f k8s/secret.yaml
apiVersion: v1
kind: Secret
metadata:
  name: localrag-api-secrets
  namespace: default
type: Opaque
data:
  API_KEY: <base64-encoded-value>
  OPENAI_API_KEY: <base64-encoded-value>
  ANTHROPIC_API_KEY: <base64-encoded-value>
